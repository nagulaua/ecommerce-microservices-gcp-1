apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  labels:
    app: product-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: us-central1-docker.pkg.dev/ecommerce-platform-dev-501414/ecommerce-images/product-service:v1
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: product-service-config
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://136.64.37.17:5432/productdb"
            - name: SPRING_DATASOURCE_USERNAME
              value: "appuser"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: product-db-secret
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: "250m"
              memory: "384Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20