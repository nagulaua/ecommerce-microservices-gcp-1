name: Build, Push, Deploy

on:
  push:
    branches: [main]
    paths:
      - 'services/**'

env:
  PROJECT_ID: ecommerce-platform-dev-501414
  REGION: us-central1
  REPO: ecommerce-images

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [product-service, user-service, order-service, notification-service]
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/745029091386/locations/global/workloadIdentityPools/github-pool/providers/github-provider-v2'
          service_account: 'github-actions-deployer@ecommerce-platform-dev-501414.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ matrix.service }}:${{ github.sha }}
          docker build -t $IMAGE services/${{ matrix.service }}
          docker push $IMAGE

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ecommerce-cluster
          location: ${{ env.REGION }}

      - name: Deploy to GKE
        run: |
          kubectl set image deployment/${{ matrix.service }} ${{ matrix.service }}=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ matrix.service }}:${{ github.sha }} --record